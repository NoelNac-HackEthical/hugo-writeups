<div id="auditPanel" hidden>

  <div class="audit-head">
    <strong>Writeup audit (local)</strong>
    <div class="audit-actions">
      <button type="button" id="auditRefresh">Refresh</button>
      <button type="button" id="auditClose">Close</button>
    </div>
  </div>

  <div class="audit-body">

    <div class="audit-kv">
      <div><span class="k">URL</span><span class="v" id="aUrl"></span></div>
      <div><span class="k">Title</span><span class="v" id="aTitle"></span></div>
      <div><span class="k">Description</span><span class="v" id="aDesc"></span></div>
    </div>

    <hr>

    <div id="auditResults"></div>

  </div>

  <button id="auditTop" hidden>↑ Top</button>

</div>


<style>
#auditPanel{
 position:fixed;
 right:1rem;
 top:1rem;
 bottom:auto;
 width:min(540px,calc(100vw - 2rem));
 max-height:70vh;
 overflow:auto;
 z-index:99999;

 background:var(--theme,#111);
 color:var(--content,#eee);
 border:1px solid rgba(255,255,255,.15);
 border-radius:12px;
 box-shadow:0 10px 30px rgba(0,0,0,.35);
}

.audit-head{
 display:flex;
 justify-content:space-between;
 align-items:center;
 padding:.7rem .8rem;
 border-bottom:1px solid rgba(255,255,255,.12);

 position:sticky;
 top:0;
 z-index:2;
 background:var(--theme,#111);
}

.audit-actions button{
 margin-left:.4rem;
 padding:.25rem .55rem;
 border-radius:8px;
 border:1px solid rgba(255,255,255,.2);
 background:transparent;
 color:inherit;
 cursor:pointer;
}

.audit-body{
 padding:.8rem;
}

.audit-kv .k{
 display:inline-block;
 width:110px;
 opacity:.75;
 vertical-align:top;
}

.audit-kv .v{
 display:inline-block;
 width:calc(100% - 120px);
 word-break:break-word;
}

#auditPanel ul{
 margin:.4rem 0 .8rem 1.2rem;
}

#auditPanel code{
 font-size:.9em;
}

.ok{ color:#8be28b }
.warn{ color:#ffd27a }
.bad{ color:#ff8a8a }
.dim{ opacity:.75 }

#auditTop{
 position:absolute;
 right:.8rem;
 bottom:.8rem;

 padding:.35rem .55rem;
 border-radius:8px;
 border:1px solid rgba(255,255,255,.2);
 background:var(--theme,#111);
 color:var(--content,#eee);

 cursor:pointer;
 z-index:5;
 opacity:.8;
}
</style>


<script>
(function(){

  const panel = document.getElementById("auditPanel");
  if(!panel) return;

  const params = new URLSearchParams(location.search);
  const auditOn = params.get("audit") === "1";

  if(!auditOn) return;

  panel.hidden = false;

  const $ = s => document.querySelector(s);
  const results = document.getElementById("auditResults");
  const topBtn = document.getElementById("auditTop");

  function li(level,html){
    return "<li class='"+level+"'>"+html+"</li>";
  }

  function section(title,items){
    let html = "<div><strong>"+title+"</strong><ul>";
    items.forEach(i => html+=i);
    html+="</ul></div>";
    results.insertAdjacentHTML("beforeend",html);
  }

  function esc(s){
    return (s||"")
      .replace(/&/g,"&amp;")
      .replace(/</g,"&lt;")
      .replace(/>/g,"&gt;");
  }

  function probeWidth(url, cb){
    if(!url){ cb(0); return; }
    const im = new Image();
    im.onload = () => cb(im.naturalWidth || 0);
    im.onerror = () => cb(0);
    im.src = url;
  }

  function runAudit(){

    results.innerHTML="";

    const title = document.title || "";
    const descNode = $('meta[name="description"]');
    const desc = descNode ? (descNode.content || "").trim() : "";

    document.getElementById("aUrl").textContent = location.href;
    document.getElementById("aTitle").textContent = title || "(missing)";
    document.getElementById("aDesc").textContent = desc || "(missing)";

    const titleLen = title.length;
    const descLen = desc.length;

    const canonNode = $('link[rel="canonical"]');
    const robotsNode = $('meta[name="robots"]');

    const canon = canonNode ? canonNode.href : "";
    const robots = robotsNode ? robotsNode.content : "";

    const robotsLevel =
      robots
        ? (robots.indexOf("noindex") !== -1 ? "bad" : "warn")
        : "ok";

    section("SEO",[

      li(titleLen ? (titleLen<20||titleLen>65?"warn":"ok"):"bad",
      "Title length: <code>"+titleLen+"</code> <span class='dim'>(30-65)</span>"),

      li(descLen ? (descLen<80||descLen>170?"warn":"ok"):"bad",
      "Meta description: <code>"+descLen+"</code> <span class='dim'>(120-160)</span>"),

      li(canon?"ok":"warn",
      "Canonical: "+(canon?"<code>"+esc(canon)+"</code>":"missing")),

      li(robotsLevel,
      "Meta robots: "+(robots?"<code>"+esc(robots)+"</code>":"none"))

    ]);

    const h1 = document.querySelectorAll("main h1");
    const h2 = document.querySelectorAll("main h2");
    const h3 = document.querySelectorAll("main h3");
    const toc = document.getElementById("TableOfContents");

    section("Structure",[

      li(h1.length===1?"ok":(h1.length===0?"bad":"warn"),
      "H1 count: <code>"+h1.length+"</code>"),

      li(h2.length?"ok":"warn",
      "H2 count: <code>"+h2.length+"</code>"),

      li("ok",
      "H3 count: <code>"+h3.length+"</code>"),

      li(toc?"ok":"warn",
      "TOC present")

    ]);

    const imgs = Array.from(document.querySelectorAll("main img"));
    let missingAlt=0;
    imgs.forEach(img=>{
      const alt = img.getAttribute("alt")||"";
      if(!alt.trim()) missingAlt++;
    });

    const heroImg =
      document.querySelector(".post-cover img") ||
      document.querySelector(".post-header img") ||
      document.querySelector(".post-content img");

    const heroLineId = "auditHeroRendered";
    const origLineId = "auditHeroOriginal";

    section("Images",[

      li("ok","Images in article: <code>"+imgs.length+"</code>"),
      li(missingAlt?"bad":"ok","Missing alt: <code>"+missingAlt+"</code>"),

      // "<li id='"+heroLineId+"' class='warn'>Hero width in page: <code>…</code> <span class='dim'>(>=1200 recommended)</span></li>",
      "<li id='"+origLineId+"' class='dim'>Original hero width: <code>…</code> <span class='dim'>(best effort)</span></li>"

    ]);

    const heroLi = document.getElementById(heroLineId);
    const origLi = document.getElementById(origLineId);

    const heroSrc = heroImg ? (heroImg.currentSrc || heroImg.getAttribute("src") || "") : "";

    /*
    probeWidth(heroSrc, (w) => {
      const level = (w >= 1200) ? "ok" : "warn";
      if(heroLi){
        heroLi.className = level;
        heroLi.innerHTML =
          "Hero width in page: <code>"+(w||"?")+"</code> <span class='dim'>(>=1200 recommended)</span>";
      }
    });
    */

    let origSrc = "";
    if(heroSrc){
      origSrc = heroSrc.replace(/_hu_[^/.]+(?=\.)/i, "");
    }

    if(origSrc && origSrc !== heroSrc){
      probeWidth(origSrc, (w) => {
        const level = (w >= 1200) ? "ok" : (w > 0 ? "warn" : "dim");
        if(origLi){
          origLi.className = level;
          origLi.innerHTML =
            "Original hero width: <code>"+(w||"?")+"</code>";
        }
      });
    } else {
      if(origLi){
        origLi.className = "dim";
        origLi.innerHTML =
          "Original hero width: <code>(n/a)</code> <span class='dim'>(no _hu_ detected)</span>";
      }
    }

// ---- Discover ----

const ogNode = $('meta[property="og:image"]');
const ogImage = ogNode ? (ogNode.content || "").trim() : "";

const twitterNode = $('meta[name="twitter:image"]');
const twitterImage = twitterNode ? (twitterNode.content || "").trim() : "";

const robotsMeta = $('meta[name="robots"]');
const googlebotMeta = $('meta[name="googlebot"]');

const robotsContent = (robotsMeta ? (robotsMeta.content || "") : "")
  .toLowerCase().replace(/\s+/g,"");
const googlebotContent = (googlebotMeta ? (googlebotMeta.content || "") : "")
  .toLowerCase().replace(/\s+/g,"");

const hasRobots = robotsContent.includes("max-image-preview:large");
const hasGooglebot = googlebotContent.includes("max-image-preview:large");

let previewLevel = "warn";
let previewText = "max-image-preview:large <span class='dim'>(missing)</span>";

if(hasGooglebot){
  previewLevel = "ok";
  previewText = "max-image-preview:large <span class='dim'>(googlebot)</span>";
} else if(hasRobots){
  previewLevel = "ok";
  previewText = "max-image-preview:large <span class='dim'>(robots)</span>";
}

section("Discover",[

  li(ogImage ? "ok" : "warn",
  "og:image: " + (ogImage ? "<code>"+esc(ogImage)+"</code>" : "missing")),

  li(twitterImage ? "ok" : "warn",
  "twitter:image: " + (twitterImage ? "<code>"+esc(twitterImage)+"</code>" : "missing")),

  li(previewLevel, previewText),

  "<li id='auditDiscoverWidth' class='warn'>Discover image width: <code>…</code></li>",
  "<li id='auditDiscoverRatio' class='dim'>Discover image ratio: <code>…</code></li>"

]);

const discoverWidth = document.getElementById("auditDiscoverWidth");
const discoverRatio = document.getElementById("auditDiscoverRatio");

probeWidth(ogImage, (w) => {

  if(discoverWidth){
    const level = (w >= 1200) ? "ok" : "warn";
    discoverWidth.className = level;
    discoverWidth.innerHTML =
      "Discover image width: <code>"+(w||"?")+"</code> <span class='dim'>(>=1200 recommended)</span>";
  }

  if(!ogImage) return;

  const img = new Image();
  img.onload = () => {

    const ratio = (img.naturalWidth / img.naturalHeight).toFixed(2);

    let ratioLabel = "other";
    if(Math.abs(ratio - 1) < 0.05) ratioLabel = "square";
    if(Math.abs(ratio - 1.77) < 0.1) ratioLabel = "16:9";

    if(discoverRatio){
      discoverRatio.className = (ratioLabel === "square" || ratioLabel === "16:9") ? "ok" : "warn";
      discoverRatio.innerHTML =
        "Discover image ratio: <code>"+ratioLabel+"</code>";
    }

  };

  img.src = ogImage;

});

  }

  const btnClose = document.getElementById("auditClose");
  const btnRefresh = document.getElementById("auditRefresh");

  if(btnClose) btnClose.addEventListener("click", ()=> { panel.hidden = true; });
  if(btnRefresh) btnRefresh.addEventListener("click", () => location.reload());

  panel.addEventListener("scroll", () => topBtn.hidden = panel.scrollTop < 300);
  topBtn.onclick = () => panel.scrollTo({top:0,behavior:"smooth"});

  let started = false;

  window.addEventListener("postcontent-ready", () => {
    if(started) return;
    started = true;
    runAudit();
  }, { once:true });

  window.addEventListener("load", () => {
    if(started) return;
    started = true;
    runAudit();
  }, { once:true });

  setTimeout(() => { if(!started){ started = true; runAudit(); } }, 300);

})();
</script>
